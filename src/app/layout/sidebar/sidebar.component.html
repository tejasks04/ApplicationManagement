<aside [ngClass]="collapsed() ? 'w-16' : 'w-56'"
  class="bg-white border-r border-gray-100 flex flex-col transition-all duration-200 shadow-sm flex-shrink-0 min-h-screen">

  <div class="p-4 border-b border-gray-100 flex items-center gap-2 min-h-[64px]">
    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm flex-shrink-0">T</div>
    @if (!collapsed()) {
      <div class="overflow-hidden">
        <p class="font-bold text-gray-800 text-sm truncate">TechCorp Solutions</p>
        <p class="text-xs text-gray-400">Admin Panel</p>
      </div>
    }
  </div>

  <nav class="flex-1 p-3 space-y-1">
    @for (item of navItems; track item.path) {
      <a [routerLink]="item.path" routerLinkActive="bg-indigo-600 text-white shadow-sm"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all text-gray-600 hover:bg-gray-50"
        [ngClass]="collapsed() ? 'justify-center' : ''">
        <span class="text-base flex-shrink-0">{{ item.icon }}</span>
        @if (!collapsed()) { <span class="truncate">{{ item.label }}</span> }
      </a>
    }
  </nav>

  <button (click)="toggle()"
    class="m-3 p-2 rounded-lg text-gray-400 hover:bg-gray-100 text-sm transition">
    {{ collapsed() ? '▶' : '◀' }}
  </button>
</aside>
