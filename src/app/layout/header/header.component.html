<header class="bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between min-h-[64px]">
  <div>
    <h1 class="text-lg font-bold text-gray-800">TechCorp Solutions</h1>
    <p class="text-xs text-gray-400">Application Management System</p>
  </div>

  <div class="flex items-center gap-3">
    <!-- Avatar -->
    <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-bold">
      {{ auth.currentUser()?.initials ?? 'U' }}
    </div>

    <!-- User info -->
    <div class="hidden sm:block text-right">
      <p class="text-xs font-semibold text-gray-700">{{ auth.currentUser()?.name ?? 'User' }}</p>
      <p class="text-xs text-gray-400">{{ auth.currentUser()?.email ?? '' }}</p>
    </div>

    <!-- Logout -->
    <button
      (click)="auth.logout()"
      class="ml-2 text-xs text-gray-400 hover:text-red-500 border border-gray-200 hover:border-red-200 px-3 py-1.5 rounded-lg transition font-medium">
      Sign out
    </button>
  </div>
</header>
