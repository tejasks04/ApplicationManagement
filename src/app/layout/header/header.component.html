<header class="bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between min-h-[64px]">
  <div>
    <h1 class="text-lg font-bold text-gray-800">TechCorp Solutions</h1>
    <p class="text-xs text-gray-400">Application Management System</p>
  </div>
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-bold">
      {{ currentUser.initials }}
    </div>
    <div class="hidden sm:block text-right">
      <p class="text-xs font-semibold text-gray-700">{{ currentUser.name }}</p>
      <p class="text-xs text-gray-400">{{ currentUser.role }}</p>
    </div>
  </div>
</header>
