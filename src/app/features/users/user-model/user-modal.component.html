<div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">

  <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl space-y-4 max-h-[90vh] overflow-y-auto">

    <h3 class="text-lg font-bold text-gray-800">
      {{ mode() === 'edit'
          ? 'Edit User — ' + user().name
          : 'Add New User'
      }}
    </h3>

    <div class="space-y-3">

      @if (mode() === 'add') {

        <input
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
          placeholder="Full Name"
          [value]="user().name"
          (input)="updateName($event)" />

        <input
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
          placeholder="Email"
          [value]="user().email"
          (input)="updateEmail($event)" />
      }

      <!-- Role -->
      <div>

        <label class="text-xs font-semibold text-gray-500">
          Role
        </label>

        <select
          class="w-full mt-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
          [value]="user().role"
          (change)="updateRole($event)">

          <option value="admin">
            admin
          </option>

          <option value="user">
            user
          </option>

        </select>
      </div>

      <!-- Status -->
      <div>

        <label class="text-xs font-semibold text-gray-500">
          Status
        </label>

        <select
          class="w-full mt-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
          [value]="user().status"
          (change)="updateStatus($event)">

          <option value="active">
            active
          </option>

          <option value="inactive">
            inactive
          </option>

        </select>
      </div>

      <!-- App Access -->
      <div>

        <label class="text-xs font-semibold text-gray-500 block mb-2">
          App Access
        </label>

        <div class="grid grid-cols-2 gap-2">

          @for (app of apps(); track app.id) {

            <label class="flex items-center gap-2 text-sm cursor-pointer">

              <input
                type="checkbox"
                class="accent-indigo-600"
                [checked]="hasApp(app.id)"
                (change)="toggleApp(app.id)" />

              {{ app.icon }} {{ app.name }}

            </label>
          }

        </div>

      </div>

    </div>

    <!-- Actions -->
    <div class="flex gap-2 pt-2">

      <button
        (click)="onSave()"
        class="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition">

        {{ mode() === 'edit' ? 'Save' : 'Add' }}

      </button>

      <button
        (click)="onCancel()"
        class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg text-sm font-semibold hover:bg-gray-200 transition">

        Cancel

      </button>

    </div>

  </div>

</div>
