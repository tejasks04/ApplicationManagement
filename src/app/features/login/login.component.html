<div class="min-h-screen bg-gradient-to-br from-indigo-50 to-gray-100 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-10 w-full max-w-md flex flex-col gap-6">

    <!-- Logo -->
    <div class="flex flex-col items-center gap-3">
      <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold shadow-lg">
        T
      </div>
      <div class="text-center">
        <h1 class="text-2xl font-bold text-gray-800">TechCorp Solutions</h1>
        <p class="text-sm text-gray-400 mt-1">Application Management Portal</p>
      </div>
    </div>

    <div class="w-full border-t border-gray-100"></div>

    <!-- Form -->
    <div class="flex flex-col gap-4">

      <!-- Email -->
      <div>
        <label class="text-xs font-semibold text-gray-500 block mb-1.5">Email</label>
        <input
          type="email"
          placeholder="you@techcorp.com"
          [(ngModel)]="email"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 transition" />
      </div>

      <!-- Password -->
      <div>
        <label class="text-xs font-semibold text-gray-500 block mb-1.5">Password</label>
        <input
          type="password"
          placeholder="••••••••"
          [(ngModel)]="password"
          (keydown.enter)="login()"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 transition" />
      </div>

      <!-- Error -->
      @if (error) {
        <div class="bg-red-50 border border-red-200 text-red-600 text-xs rounded-xl px-4 py-3">
          ⚠️ {{ error }}
        </div>
      }

      <!-- Submit -->
      <button
        (click)="login()"
        [disabled]="loading"
        class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 text-white font-semibold py-2.5 rounded-xl text-sm transition flex items-center justify-center gap-2">
        @if (loading) {
          <span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span>
          Signing in...
        } @else {
          Sign in
        }
      </button>
    </div>

    <!-- Demo credentials -->
    <div class="bg-gray-50 rounded-xl p-4 text-xs text-gray-500 space-y-1">
      <p class="font-semibold text-gray-600 mb-2">Demo credentials:</p>
      <p>👑 <span class="font-medium">alice&#64;techcorp.com</span> / admin123</p>
      <p>👑 <span class="font-medium">david&#64;techcorp.com</span> / admin123</p>
      <p>👤 <span class="font-medium">bob&#64;techcorp.com</span> / user123</p>
      <p>👤 <span class="font-medium">carol&#64;techcorp.com</span> / user123</p>
    </div>

  </div>
</div>
